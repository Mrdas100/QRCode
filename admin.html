<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#C9A84C;--gold-l:#E8C97A;--gold-d:#9A7632;
  --bg:#0D0D0D;--bg2:#131313;--bg3:#1A1A1A;--bg4:#222;--bg5:#2A2A2A;
  --text:#F0EDE6;--muted:#888880;--muted2:#555;
  --border:rgba(201,168,76,0.18);--border2:rgba(255,255,255,0.07);
  --red:#E05050;--green:#4CAF80;
}
body{background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif;min-height:100vh}

/* ── LOGIN ── */
#loginScreen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;
  background:radial-gradient(ellipse at 70% 20%,rgba(201,168,76,.07) 0%,transparent 60%),var(--bg);
}
.login-card{
  width:100%;max-width:380px;background:var(--bg3);
  border:1px solid var(--border);border-radius:20px;padding:2.5rem 2rem;
  display:flex;flex-direction:column;gap:1.4rem;
}
.login-logo{text-align:center}
.login-logo .mark{font-size:2rem;color:var(--gold)}
.login-logo h1{font-size:1.3rem;font-weight:700;margin-top:.5rem}
.login-logo p{font-size:.82rem;color:var(--muted);margin-top:.25rem}
.field{display:flex;flex-direction:column;gap:.4rem}
.field label{font-size:.82rem;color:var(--muted)}
.field input{
  background:var(--bg4);border:1px solid var(--border2);border-radius:10px;
  padding:.72rem 1rem;color:var(--text);font-family:'Tajawal',sans-serif;font-size:.9rem;
  outline:none;transition:border-color .2s;
}
.field input:focus{border-color:var(--gold)}
.field input::placeholder{color:var(--muted2)}
.err{font-size:.8rem;color:var(--red);background:rgba(224,80,80,.08);
     border-radius:8px;padding:.5rem .8rem;display:none}
.btn-login{
  background:var(--gold);color:var(--bg);border:none;border-radius:11px;
  padding:.85rem;font-family:'Tajawal',sans-serif;font-size:1rem;font-weight:700;
  cursor:pointer;transition:background .2s,transform .1s;
}
.btn-login:hover{background:var(--gold-l)}
.btn-login:active{transform:scale(.98)}
.btn-login:disabled{opacity:.5;cursor:not-allowed}

/* ── DASHBOARD ── */
#dashboard{display:none;min-height:100vh;flex-direction:row}

/* Sidebar */
.sidebar{
  width:230px;min-height:100vh;background:var(--bg2);
  border-left:1px solid var(--border2);
  display:flex;flex-direction:column;padding:1.5rem 1rem;gap:.4rem;
  position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0;
}
.sidebar-logo{padding:.5rem .75rem 1.25rem;border-bottom:1px solid var(--border2);margin-bottom:.5rem}
.sidebar-logo .mark{font-size:1.2rem;color:var(--gold)}
.sidebar-logo p{font-size:.78rem;color:var(--muted);margin-top:.2rem}
.nav-item{
  display:flex;align-items:center;gap:.6rem;
  padding:.65rem .75rem;border-radius:10px;cursor:pointer;
  font-size:.88rem;color:var(--muted);transition:all .2s;
  border:none;background:transparent;width:100%;text-align:right;font-family:'Tajawal',sans-serif;
}
.nav-item:hover{background:var(--bg4);color:var(--text)}
.nav-item.active{background:rgba(201,168,76,.12);color:var(--gold);font-weight:500}
.nav-icon{font-size:1rem;width:20px;text-align:center;flex-shrink:0}
.sidebar-spacer{flex:1}
.user-row{
  display:flex;align-items:center;gap:.6rem;
  padding:.6rem .75rem;border-radius:10px;
  background:var(--bg3);border:1px solid var(--border2);
}
.u-avatar{
  width:30px;height:30px;border-radius:50%;
  background:rgba(201,168,76,.15);
  display:flex;align-items:center;justify-content:center;
  font-size:.8rem;color:var(--gold);font-weight:700;flex-shrink:0;
}
.u-email{font-size:.72rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.logout-btn{
  background:transparent;border:none;color:var(--red);
  cursor:pointer;font-size:.8rem;font-family:'Tajawal',sans-serif;
  padding:.4rem .75rem;border-radius:8px;width:100%;text-align:right;
  transition:background .2s;margin-top:.25rem;
}
.logout-btn:hover{background:rgba(224,80,80,.08)}

/* Main */
.main{flex:1;padding:2rem;overflow-y:auto;max-width:800px}
.page-section{display:none}
.page-section.active{display:block}
.page-title{font-size:1.25rem;font-weight:700;margin-bottom:1.5rem;
  display:flex;align-items:center;gap:.6rem}
.page-title::before{content:'';display:block;width:3px;height:1.1em;background:var(--gold);border-radius:2px}

/* Cards */
.card{
  background:var(--bg3);border:1px solid var(--border2);border-radius:16px;
  padding:1.25rem;margin-bottom:1rem;
}
.card-title{font-size:.85rem;color:var(--muted);margin-bottom:1rem;font-weight:500}

/* Form elements */
.form-group{display:flex;flex-direction:column;gap:.35rem;margin-bottom:.85rem}
.form-group label{font-size:.8rem;color:var(--muted)}
.inp{
  background:var(--bg4);border:1px solid var(--border2);border-radius:9px;
  padding:.65rem .9rem;color:var(--text);font-family:'Tajawal',sans-serif;font-size:.88rem;
  outline:none;transition:border-color .2s;width:100%;
}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--muted2)}

/* Buttons */
.btn{
  padding:.65rem 1.25rem;border-radius:10px;
  font-family:'Tajawal',sans-serif;font-size:.88rem;font-weight:500;
  cursor:pointer;border:1px solid var(--border);transition:all .2s;
}
.btn-gold{background:var(--gold);color:var(--bg);border-color:var(--gold)}
.btn-gold:hover{background:var(--gold-l)}
.btn-outline{background:transparent;color:var(--gold)}
.btn-outline:hover{background:rgba(201,168,76,.08)}
.btn-danger{background:transparent;color:var(--red);border-color:rgba(224,80,80,.25)}
.btn-danger:hover{background:rgba(224,80,80,.08)}
.btn-sm{padding:.45rem .85rem;font-size:.8rem;border-radius:8px}
.btn-icon{
  width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  background:transparent;border:1px solid var(--border2);color:var(--muted);
  cursor:pointer;transition:all .2s;font-size:.85rem;flex-shrink:0;
}
.btn-icon:hover{border-color:var(--border);color:var(--text)}
.btn-icon.del:hover{border-color:rgba(224,80,80,.3);color:var(--red);background:rgba(224,80,80,.06)}

/* Save indicator */
.save-bar{
  display:none;position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);
  background:var(--bg3);border:1px solid var(--border);border-radius:30px;
  padding:.55rem 1.25rem;font-size:.85rem;color:var(--gold);z-index:100;
  white-space:nowrap;
}
.save-bar.show{display:block;animation:slideUp .3s ease}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* Links manager */
.links-list{display:flex;flex-direction:column;gap:.6rem;margin-bottom:1rem}
.link-row{
  display:flex;align-items:center;gap:.5rem;
  background:var(--bg4);border:1px solid var(--border2);border-radius:10px;
  padding:.6rem .75rem;
}
.link-row .icon-inp{width:48px;text-align:center;flex-shrink:0;border-color:transparent;background:transparent}
.link-row .title-inp{flex:1;min-width:80px}
.link-row .url-inp{flex:2;min-width:120px;direction:ltr;text-align:left}
.toggle{
  width:36px;height:20px;border-radius:10px;border:none;cursor:pointer;
  position:relative;transition:background .25s;flex-shrink:0;
}
.toggle::after{
  content:'';position:absolute;top:2px;
  width:16px;height:16px;border-radius:50%;background:#fff;transition:left .25s;
}
.toggle.on{background:var(--gold)}
.toggle.on::after{left:18px}
.toggle.off{background:var(--muted2)}
.toggle.off::after{left:2px}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.75rem;margin-bottom:1rem}
.stat-card{
  background:var(--bg4);border:1px solid var(--border2);border-radius:12px;
  padding:1rem;display:flex;flex-direction:column;gap:.3rem;
}
.stat-icon{font-size:1.4rem}
.stat-num{font-size:1.5rem;font-weight:700;color:var(--gold)}
.stat-label{font-size:.75rem;color:var(--muted)}

/* QR preview */
.qr-preview{background:#fff;padding:12px;border-radius:10px;display:inline-block}
.qr-preview canvas,#adminQR canvas,#adminQR img{display:block}

/* Avatar preview */
.av-preview{
  width:72px;height:72px;border-radius:50%;border:2px solid var(--border);
  overflow:hidden;display:flex;align-items:center;justify-content:center;
  background:var(--bg4);font-size:1.6rem;color:var(--gold);font-weight:700;flex-shrink:0;
}
.av-preview img{width:100%;height:100%;object-fit:cover}

/* Mobile nav */
@media(max-width:640px){
  #dashboard{flex-direction:column}
  .sidebar{
    width:100%;min-height:auto;height:auto;position:static;
    flex-direction:row;flex-wrap:wrap;padding:.75rem;gap:.4rem;
    border-left:none;border-bottom:1px solid var(--border2);
  }
  .sidebar-logo,.sidebar-spacer,.user-row,.logout-btn{display:none}
  .nav-item{padding:.5rem .65rem;font-size:.8rem}
  .main{padding:1.25rem}
}
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <div class="mark">⬡</div>
      <h1>لوحة التحكم</h1>
      <p>سجّل دخولك للمتابعة</p>
    </div>
    <div class="field">
      <label>البريد الإلكتروني</label>
      <input type="email" id="emailInp" placeholder="admin@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label>كلمة المرور</label>
      <input type="password" id="passInp" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="err" id="loginErr"></div>
    <button class="btn-login" id="loginBtn" onclick="doLogin()">دخول</button>
  </div>
</div>

<!-- ── DASHBOARD ── -->
<div id="dashboard">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="mark">⬡ لوحة التحكم</div>
      <p id="sideEmail"></p>
    </div>
    <button class="nav-item active" data-tab="overview" onclick="switchTab(this)">
      <span class="nav-icon">◈</span> نظرة عامة
    </button>
    <button class="nav-item" data-tab="profile" onclick="switchTab(this)">
      <span class="nav-icon">◎</span> الملف الشخصي
    </button>
    <button class="nav-item" data-tab="links" onclick="switchTab(this)">
      <span class="nav-icon">⊞</span> إدارة الروابط
    </button>
    <button class="nav-item" data-tab="qr" onclick="switchTab(this)">
      <span class="nav-icon">▣</span> رمز QR
    </button>
    <div class="sidebar-spacer"></div>
    <div class="user-row">
      <div class="u-avatar" id="uAvatar">أ</div>
      <div class="u-email" id="uEmail"></div>
    </div>
    <button class="logout-btn" onclick="doLogout()">⏻ تسجيل الخروج</button>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- Overview -->
    <section class="page-section active" id="tab-overview">
      <div class="page-title">نظرة عامة</div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon">⊞</div>
          <div class="stat-num" id="stat-links">—</div>
          <div class="stat-label">روابط نشطة</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">◎</div>
          <div class="stat-num" id="stat-name">—</div>
          <div class="stat-label">اسم الملف</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">▣</div>
          <div class="stat-num">جاهز</div>
          <div class="stat-label">رمز QR</div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">معاينة الصفحة العامة</div>
        <a href="index.html" target="_blank" class="btn btn-outline" style="display:inline-flex;align-items:center;gap:.4rem">
          ↗ فتح صفحة العميل
        </a>
      </div>
      <div class="card" id="ov-links-card">
        <div class="card-title">الروابط الحالية</div>
        <div id="ov-links-list"></div>
      </div>
    </section>

    <!-- Profile -->
    <section class="page-section" id="tab-profile">
      <div class="page-title">الملف الشخصي</div>
      <div class="card">
        <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem">
          <div class="av-preview" id="avPreview"><span id="avInitial">ي</span></div>
          <div style="flex:1">
            <div style="font-size:.8rem;color:var(--muted);margin-bottom:.35rem">صورة الملف الشخصي (رابط URL)</div>
            <input class="inp" id="avatarUrl" placeholder="https://..." oninput="previewAvatar()">
          </div>
        </div>
        <div class="form-group">
          <label>الاسم</label>
          <input class="inp" id="profileName" placeholder="يوسف">
        </div>
        <div class="form-group">
          <label>النبذة التعريفية</label>
          <input class="inp" id="profileBio" placeholder="مطعم شاهي قمرا · M7 Store">
        </div>
        <button class="btn btn-gold" onclick="saveProfile()">✓ حفظ الملف الشخصي</button>
      </div>
    </section>

    <!-- Links -->
    <section class="page-section" id="tab-links">
      <div class="page-title">إدارة الروابط</div>
      <div class="card">
        <div class="card-title">الروابط · اسحب لإعادة الترتيب</div>
        <div class="links-list" id="linksEditor"></div>
        <button class="btn btn-outline" onclick="addNewLink()" style="width:100%;justify-content:center">+ إضافة رابط</button>
      </div>
      <button class="btn btn-gold" onclick="saveLinks()" style="width:100%">✓ حفظ جميع الروابط</button>
    </section>

    <!-- QR -->
    <section class="page-section" id="tab-qr">
      <div class="page-title">رمز QR</div>
      <div class="card" style="display:flex;flex-direction:column;align-items:center;gap:1rem">
        <div class="qr-preview" id="adminQR"></div>
        <p style="font-size:.8rem;color:var(--muted);text-align:center">يحتوي الرمز على جميع الروابط النشطة</p>
        <div style="display:flex;gap:.6rem">
          <button class="btn btn-outline" onclick="downloadAdminQR()">⬇ تحميل PNG</button>
          <button class="btn btn-gold" onclick="refreshQR()">↺ تحديث</button>
        </div>
      </div>
    </section>

  </main>
</div>

<div class="save-bar" id="saveBar"></div>

<script>
// ============================
// 🔥 ضع إعدادات Firebase هنا
// ============================
const firebaseConfig = {
  apiKey: "AIzaSyDqRAWvemQQH8HjdeHn8fiJot0nK8_HJzI",
  authDomain: "qrcode-9fc2e.firebaseapp.com",
databaseURL: "https://qrcode-9fc2e-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "qrcode-9fc2e",
  storageBucket: "qrcode-9fc2e.firebasestorage.app",
  messagingSenderId: "783019589227",
  appId: "1:783019589227:web:b4110ffe0e88227d213b2e",
  measurementId: "G-F62Z7HRG4S"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

let currentLinks = [];
let currentProfile = {};

// ── AUTH ──
auth.onAuthStateChanged(user => {
  if(user){
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'flex';
    document.getElementById('uEmail').textContent = user.email;
    document.getElementById('uAvatar').textContent = user.email[0].toUpperCase();
    document.getElementById('sideEmail').textContent = user.email;
    loadAll();
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
  }
});

async function doLogin(){
  const email = document.getElementById('emailInp').value.trim();
  const pass = document.getElementById('passInp').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginErr');
  err.style.display = 'none';
  btn.disabled = true; btn.textContent = 'جاري الدخول...';
  try{
    await auth.signInWithEmailAndPassword(email, pass);
  } catch(e){
    err.textContent = e.code === 'auth/wrong-password' ? 'كلمة المرور غير صحيحة'
      : e.code === 'auth/user-not-found' ? 'البريد الإلكتروني غير موجود'
      : e.code === 'auth/invalid-email' ? 'البريد الإلكتروني غير صالح'
      : 'خطأ: ' + e.message;
    err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'دخول';
  }
}

document.getElementById('passInp').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

async function doLogout(){
  await auth.signOut();
}

// ── DATA ──
async function loadAll(){
  const snap = await db.ref('siteData').get();
  const data = snap.val() || {};
  currentProfile = data.profile || {};
  currentLinks = data.links || [];
  renderOverview();
  renderProfileForm();
  renderLinksEditor();
  buildAdminQR();
}

function renderOverview(){
  const active = currentLinks.filter(l=>l&&l.active!==false);
  document.getElementById('stat-links').textContent = active.length;
  document.getElementById('stat-name').textContent = currentProfile.name || '—';
  const ul = document.getElementById('ov-links-list');
  ul.innerHTML = currentLinks.map(l=>`
    <div style="display:flex;align-items:center;gap:.6rem;padding:.45rem 0;border-bottom:1px solid var(--border2)">
      <span style="font-size:1.1rem">${l.icon||'🔗'}</span>
      <span style="font-size:.85rem;flex:1">${l.title}</span>
      <span style="font-size:.75rem;color:${l.active===false?'var(--red)':'var(--green)'}">
        ${l.active===false?'مخفي':'نشط'}
      </span>
    </div>`).join('');
}

function renderProfileForm(){
  document.getElementById('profileName').value = currentProfile.name || '';
  document.getElementById('profileBio').value = currentProfile.bio || '';
  document.getElementById('avatarUrl').value = currentProfile.avatar || '';
  previewAvatar();
}

function previewAvatar(){
  const url = document.getElementById('avatarUrl').value.trim();
  const name = document.getElementById('profileName').value || 'ي';
  const pv = document.getElementById('avPreview');
  const init = document.getElementById('avInitial');
  if(url){
    pv.innerHTML = `<img src="${url}" onerror="this.parentElement.innerHTML='<span>${name[0]}</span>'">`;
  } else {
    pv.innerHTML = `<span>${name[0]}</span>`;
  }
}

function renderLinksEditor(){
  const el = document.getElementById('linksEditor');
  el.innerHTML = '';
  currentLinks.forEach((l,i)=>{
    const row = document.createElement('div');
    row.className = 'link-row';
    const isOn = l.active !== false;
    row.innerHTML = `
      <input class="inp icon-inp" value="${l.icon||'🔗'}" id="ic_${i}" placeholder="🔗" title="الأيقونة">
      <input class="inp title-inp" value="${l.title||''}" id="ti_${i}" placeholder="الاسم">
      <input class="inp url-inp" value="${l.url||''}" id="ur_${i}" placeholder="https://...">
      <button class="toggle ${isOn?'on':'off'}" id="tg_${i}" onclick="toggleLink(${i})" title="${isOn?'إخفاء':'إظهار'}"></button>
      <button class="btn-icon del" onclick="removeLink(${i})" title="حذف">✕</button>`;
    el.appendChild(row);
    ['ic','ti','ur'].forEach(p=>{
      document.getElementById(`${p}_${i}`).addEventListener('input', e=>{
        const key = p==='ic'?'icon':p==='ti'?'title':'url';
        currentLinks[i][key] = e.target.value;
      });
    });
  });
}

function toggleLink(i){
  currentLinks[i].active = currentLinks[i].active === false ? true : false;
  const btn = document.getElementById('tg_'+i);
  btn.className = 'toggle ' + (currentLinks[i].active ? 'on' : 'off');
}

function addNewLink(){
  currentLinks.push({icon:'🔗', title:'رابط جديد', url:'https://', active:true});
  renderLinksEditor();
  document.getElementById('linksEditor').lastElementChild.querySelector('.title-inp').focus();
}

function removeLink(i){
  if(!confirm('حذف هذا الرابط؟')) return;
  currentLinks.splice(i,1);
  renderLinksEditor();
}

async function saveProfile(){
  const name = document.getElementById('profileName').value.trim();
  const bio = document.getElementById('profileBio').value.trim();
  const avatar = document.getElementById('avatarUrl').value.trim();
  currentProfile = {name, bio, avatar};
  await db.ref('siteData/profile').set(currentProfile);
  renderOverview();
  toast('تم حفظ الملف الشخصي ✓');
}

async function saveLinks(){
  await db.ref('siteData/links').set(currentLinks);
  renderOverview();
  buildAdminQR();
  toast('تم حفظ الروابط ✓');
}

// ── QR ──
function buildAdminQR(){
  const el = document.getElementById('adminQR');
  el.innerHTML = '';
  const active = currentLinks.filter(l=>l&&l.active!==false);
  const text = `━ ${currentProfile.name||''} ━\n\n` + active.map(l=>`${l.icon||''} ${l.title}: ${l.url}`).join('\n');
  new QRCode(el, {text, width:220, height:220, colorDark:'#0D0D0D', colorLight:'#ffffff', correctLevel:QRCode.CorrectLevel.M});
}

function refreshQR(){ buildAdminQR(); toast('تم تحديث رمز QR ✓'); }

function downloadAdminQR(){
  const c = document.querySelector('#adminQR canvas');
  if(!c){ toast('لا يوجد رمز للتحميل'); return; }
  const a = document.createElement('a'); a.download='qr.png'; a.href=c.toDataURL(); a.click();
}

// ── UI ──
function switchTab(btn){
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.page-section').forEach(s=>s.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
}

function toast(msg){
  const bar = document.getElementById('saveBar');
  bar.textContent = msg; bar.classList.add('show');
  setTimeout(()=>bar.classList.remove('show'), 2500);
}
</script>
